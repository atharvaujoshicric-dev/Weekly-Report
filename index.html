<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weekly Report Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- PPT Generator -->
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs/dist/pptxgen.bundle.js"></script>
</head>

<body class="bg-gray-900 text-white p-6">

  <h1 class="text-3xl font-bold mb-6">📊 Weekly Report Dashboard</h1>

  <!-- Upload -->
  <input type="file" id="upload" class="mb-4" />

  <!-- Preview -->
  <div id="preview" class="bg-gray-800 p-4 rounded mb-4"></div>

  <!-- Generate -->
  <button onclick="generatePPT()" 
    class="bg-green-500 px-4 py-2 rounded">
    Generate Report
  </button>

  <script src="app.js"></script>
</body>
</html>
